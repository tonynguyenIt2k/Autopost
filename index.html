        // Prevent FOUC (Flash of Unstyled Content) for Dark Mode
        try {
            let theme = localStorage.getItem('theme');
            if (theme) {
                try { theme = JSON.parse(theme); } catch (e) { }
            }
            // If theme is dark OR no theme saved but system is dark
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        } catch (e) { console.error('Theme init error:', e); }

            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';

            errorDiv.style.color = '#b91c1c';
            errorDiv.style.padding = '20px';
            errorDiv.style.zIndex = '9999';
            errorDiv.style.fontFamily = 'monospace';

        const storage = {
            getUserPrefix: () => {
                try {
                    const uStr = localStorage.getItem('google_user');
                    if (uStr) {
                        const u = JSON.parse(uStr);
                        if (u && u.sub) {
                            return u.sub + '_';
                        }
                    }
                } catch(e) {}
                return '';
            },
            get: (key, defaultValue) => {
                try {
                    const globalKeys = ['google_user', 'subscription', 'theme', 'lang', 'active_page', 'sidebar_collapsed'];
                    const finalKey = globalKeys.includes(key) ? key : (storage.getUserPrefix() + key);
                    const item = localStorage.getItem(finalKey);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) { return defaultValue; }
            },
            set: (key, value) => {
                try {
                    const globalKeys = ['google_user', 'subscription', 'theme', 'lang', 'active_page', 'sidebar_collapsed'];
                    const finalKey = globalKeys.includes(key) ? key : (storage.getUserPrefix() + key);
                    localStorage.setItem(finalKey, JSON.stringify(value));
                } catch (e) {
                    console.warn('localStorage.setItem failed for key:', key, e.message);
                }
            },
            remove: (key) => {
                const globalKeys = ['google_user', 'subscription', 'theme', 'lang', 'active_page', 'sidebar_collapsed'];
                const finalKey = globalKeys.includes(key) ? key : (storage.getUserPrefix() + key);
                localStorage.removeItem(finalKey);
            }
        };

        // IndexedDB helper for large data (images) — avoids localStorage 5MB quota
        const imageDB = {
            DB_NAME: 'AutoPostProDB',
            STORE_NAME: 'images',
            DB_VERSION: 1,
            _open() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.DB_NAME, this.DB_VERSION);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.STORE_NAME)) {
                            db.createObjectStore(this.STORE_NAME);
                        }
                    };
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            _getKey() {
                return storage.getUserPrefix() + 'fb_post_images';
            },
            async save(images) {
                try {
                    const db = await this._open();
                    const tx = db.transaction(this.STORE_NAME, 'readwrite');
                    tx.objectStore(this.STORE_NAME).put(images, this._getKey());
                    await new Promise((resolve, reject) => {
                        tx.oncomplete = resolve;
                        tx.onerror = () => reject(tx.error);
                    });
                    db.close();
                } catch (e) {
                    console.warn('imageDB.save failed:', e.message);
                }
            },
            async load() {
                try {
                    const db = await this._open();
                    const tx = db.transaction(this.STORE_NAME, 'readonly');
                    const req = tx.objectStore(this.STORE_NAME).get(this._getKey());
                    const result = await new Promise((resolve, reject) => {
                        req.onsuccess = () => resolve(req.result);
                        req.onerror = () => reject(req.error);
                    });
                    db.close();
                    return result || [];
                } catch (e) {
                    console.warn('imageDB.load failed:', e.message);
                    return [];
                }
            },
            async clear() {
                try {
                    const db = await this._open();
                    const tx = db.transaction(this.STORE_NAME, 'readwrite');
                    tx.objectStore(this.STORE_NAME).delete(this._getKey());
                    await new Promise((resolve, reject) => {
                        tx.oncomplete = resolve;
                        tx.onerror = () => reject(tx.error);
                    });
                    db.close();
                } catch (e) {
                    console.warn('imageDB.clear failed:', e.message);
                }
            }
        };

        function App() {
            const [theme, setTheme] = useState(() => storage.get('theme', 'light'));

            const t = (key) => {

            const [extensionStatus, setExtensionStatus] = useState(false);
            const [settings, setSettings] = useState({
                appName: 'AutoPost Pro',

                bankName: 'mbbank',
                bankNo: '0886041173',
                bankUser: 'HOANG PHUONG ANH',
                qrTemplate: 'https://img.vietqr.io/image/mbbank-0886041173-compact.png'
            });
            const [fbUser, setFbUser] = useState(() => storage.get('fb_user_info', null));
            const [content, setContent] = useState(() => storage.get('fb_post_content', '') || '');
            const [groups, setGroups] = useState(() => storage.get('fb_groups', []));
            const [selectedGroups, setSelectedGroups] = useState(() => new Set(storage.get('fb_selected_groups', [])));
            const [images, setImages] = useState([]);

            // Load images from IndexedDB on mount (async)
            useEffect(() => {
                imageDB.load().then(saved => {
                    if (saved && saved.length > 0) setImages(saved);
                });
                // Also clean up any old localStorage images to free space
                try {
                    const oldKey = storage.getUserPrefix() + 'fb_post_images';

                    }
                } catch(e) {}
            }, []);
            const [isPosting, setIsPosting] = useState(false);

            const [safeDelayMax, setSafeDelayMax] = useState(() => storage.get('fb_delay_max', 120));
            const [apiKey, setApiKey] = useState(() => storage.get('gemini_api_key', ''));
            const [model, setModel] = useState(() => storage.get('gemini_model', 'gemini-3.1-flash-lite'));
            const defaultPrompt = `Viết lại nội dung thành một bài quảng cáo Facebook hoàn chỉnh.

QUY TẮC TUYỆT ĐỐI:
Bạn chỉ được phép trả về nội dung nằm trong TEMPLATE dưới đây.

TEMPLATE OUTPUT (BẮT BUỘC GIỮ NGUYÊN CẤU TRÚC):
{CONTENT}

RÀNG BUỘC:
- {CONTENT} phải là bài viết hoàn chỉnh
- Bắt đầu bằng câu mở đầu (hook)

- BẮT BUỘC giữ nguyên cấu trúc các đoạn văn, các dòng xuống dòng (line breaks/newlines) của bài viết gốc để nội dung rõ ràng, dễ đọc, không gộp tất cả thành một đoạn duy nhất.

NGHIÊM CẤM:

- Câu bắt đầu bằng: "Wait", "Total", "Final", "Check", "I will", "Actually"
- Bất kỳ tiếng Anh không cần thiết
- Ghi chú / giải thích

QUY TẮC KIỂM TRA CUỐI:
Trước khi trả kết quả:
- Nếu có bất kỳ dòng nào không thuộc bài viết → XOÁ
- Nếu có từ tiếng Anh ngoài nội dung quảng cáo → XOÁ
- Chỉ giữ lại bài viết hoàn chỉnh

QUY TẮC HARDCORE:
Nếu có bất kỳ ký tự nào ngoài {CONTENT}, hãy tự động xoá và viết lại cho đến khi đúng.

Input:
{{content}}`;
            const [customPrompt, setCustomPrompt] = useState(() => storage.get('ai_custom_prompt', defaultPrompt));
            const [toasts, setToasts] = useState([]);
            const [logs, setLogs] = useState([]);
            const [progress, setProgress] = useState(0);
            const [isRewriting, setIsRewriting] = useState(false);

            // Page Posts Feature State
            const [activeTab, setActiveTab] = useState('groups'); // 'groups' | 'page_posts'
            const [pageUrl, setPageUrl] = useState('');
            const [pagePosts, setPagePosts] = useState([]);
            const [selectedPosts, setSelectedPosts] = useState(new Set());
            const [isScanning, setIsScanning] = useState(false);
            const [isScanningGroups, setIsScanningGroups] = useState(false); // Track group scan
            const [isSharing, setIsSharing] = useState(false);
            const [postingCountdown, setPostingCountdown] = useState(null); // null or { current, total }

            // Main Navigation State - PERSISTED
            const [activePage, setActivePage] = useState(() => storage.get('active_page', 'post')); // 'post' | 'share' | 'subscription'
            const [fbPages, setFbPages] = useState([]); // User's managed Facebook Pages
            const [selectedPage, setSelectedPage] = useState(null);
            const [isFetchingPages, setIsFetchingPages] = useState(false);
            const [sidebarCollapsed, setSidebarCollapsed] = useState(() => storage.get('sidebar_collapsed', false));
            // Spin Content state - Default ON
            const [spinEnabled, setSpinEnabled] = useState(true);

            // ========================================
            // Google Auth & Subscription State
            // ========================================
            const [googleUser, setGoogleUser] = useState(() => storage.get('google_user', null));
            const [authInitialized, setAuthInitialized] = useState(false);
            const [subscription, setSubscription] = useState(() => storage.get('subscription', {
                plan: 'free', // 'free' | 'pro' | 'enterprise'
                expiresAt: null,
                status: 'active', // 'active' | 'expired' | 'pending'
                history: []
            }));
            const [showPaymentModal, setShowPaymentModal] = useState(false);
            const [selectedPlan, setSelectedPlan] = useState(null);
            const [userRole, setUserRole] = useState('user');
            const [timeTick, setTimeTick] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    setTimeTick(prev => prev + 1);
                }, 60000);
                return () => clearInterval(interval);
            }, []);

            // Google Sign-In handler (Unified Shared Login)
            const handleGoogleLogin = useCallback(() => {
                window.location.href = 'login.html?redirect=index.html';
            }, []);

            const handleGoogleLogout = useCallback(() => {
                const clearLocal = () => {
                    setGoogleUser(null);
                    setSubscription({
                        plan: 'free',
                        expiresAt: null,
                        status: 'active',
                        history: []
                    });
                    storage.remove('google_user');
                    storage.remove('subscription');
                    showToast('Đã đăng xuất Google', 'info');
                };

                if (auth) {
                    auth.signOut().then(clearLocal).then(() => {
                        window.location.reload();
                    }).catch(e => {
                        console.error('Sign out error:', e);
                        clearLocal();
                        window.location.reload();
                    });
                } else {
                    clearLocal();
                    window.location.reload();
                }
            }, []);

            // Firebase Auth State Listener (Definitive Session Trust Architecture)
            useEffect(() => {
                const safetyTimer = setTimeout(() => {
                    setAuthInitialized(true);
                }, 1500);

                if (!auth) {
                    setAuthInitialized(true);
                    clearTimeout(safetyTimer);
                    return;
                }

                return auth.onAuthStateChanged(user => {
                    clearTimeout(safetyTimer);
                    if (user) {
                        const storageUser = {
                            name: user.displayName,
                            email: user.email,
                            picture: user.photoURL,
                            sub: user.uid
                        };
                        setGoogleUser(storageUser);
                        storage.set('google_user', storageUser);
                    } else {
                        // If Firebase claims no user, but we have a valid cached user in localStorage:
                        // We trust the localStorage session completely! This prevents any race condition flashing.
                        // The session is only fully cleared when the user explicitly clicks the Logout button.
                        const cachedUser = storage.get('google_user', null);
                        if (!cachedUser) {
                            setGoogleUser(null);
                        }
                    }
                    setAuthInitialized(true);
                });
            }, []);

            // System Settings Listener
            useEffect(() => {
                if (!rtdb) return;
                const settingsRef = rtdb.ref('settings');
                const onSettings = settingsRef.on('value', snapshot => {
                    const val = snapshot.val();
                    if (val) {
                        setSettings({
                            appName: val.appName || 'AutoPost Pro',
                            logoUrl: val.logoUrl || '',
                            bankName: val.bankName || 'mbbank',
                            bankNo: val.bankNo || '',
                            bankUser: val.bankUser || '',
                            qrTemplate: val.qrTemplate || ''
                        });
                    }
                });
                return () => {
                    settingsRef.off('value', onSettings);
                };
            }, []);

            // Dynamic Document Title Updater
            useEffect(() => {
                if (settings.appName) {
                    document.title = `${settings.appName} - Đăng bài tự động lên nhiều nhóm Facebook`;
                }
            }, [settings.appName]);

            // Realtime database subscription sync listener
            useEffect(() => {
                if (!googleUser || !googleUser.sub || !rtdb) return;
                
                const subRef = rtdb.ref('users/' + googleUser.sub + '/subscription');
                const onValue = subRef.on('value', (snapshot) => {
                    const subData = snapshot.val();
                    if (subData) {
                        setSubscription(subData);
                        storage.set('subscription', subData);
                    }
                }, (error) => {
                    console.error('RTDB Subscription listener error:', error);
                });
                
                return () => {
                    subRef.off('value', onValue);
                };
            }, [googleUser]);

            // Realtime database user role sync listener
            useEffect(() => {
                if (!googleUser || !googleUser.sub || !rtdb) {
                    setUserRole('user');
                    return;
                }
                const roleRef = rtdb.ref('users/' + googleUser.sub + '/role');
                const onRole = roleRef.on('value', snapshot => {
                    const role = snapshot.val() || 'user';
                    setUserRole(role);
                }, (error) => {
                    console.error('RTDB Role listener error:', error);
                });
                return () => {
                    roleRef.off('value', onRole);
                };
            }, [googleUser]);

            // Subscription helpers
            const getSubscriptionDaysLeft = useCallback(() => {
                if (!subscription.expiresAt) return 0;
                const now = new Date();
                const exp = new Date(subscription.expiresAt);
                const diff = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
                return Math.max(0, diff);
            }, [subscription.expiresAt]);

            const getSubscriptionTimeLeft = useCallback(() => {
                if (!subscription.expiresAt || subscription.status === 'expired') return { days: 0, hours: 0, text: 'Hết hạn' };
                const exp = new Date(subscription.expiresAt);
                const diffMs = exp - new Date();
                if (diffMs <= 0) return { days: 0, hours: 0, text: 'Hết hạn' };
                
                const totalHours = Math.floor(diffMs / (1000 * 60 * 60));
                const days = Math.floor(totalHours / 24);
                const hours = totalHours % 24;
                
                let text = '';
                if (days > 0) {
                    text += `${days} ngày `;
                }
                text += `${hours} giờ`;
                return { days, hours, text };
            }, [subscription.expiresAt, subscription.status]);

            const isSubscriptionActive = useCallback(() => {
                if (subscription.plan === 'free') return true;
                if (subscription.status === 'expired') return false;
                const daysLeft = getSubscriptionDaysLeft();
                return daysLeft > 0;
            }, [subscription.plan, subscription.status, getSubscriptionDaysLeft]);

            const handleSelectPlan = useCallback((plan) => {
                if (!googleUser) {
                    showToast(t('sub_require_login'), 'error');
                    return;
                }
                if (plan === 'free') {
                    const updated = { ...subscription, plan: 'free', expiresAt: null, status: 'active', pendingPlan: null, pendingMonths: null };
                    setSubscription(updated);
                    storage.set('subscription', updated);
                    
                    if (googleUser && googleUser.sub && rtdb) {
                        rtdb.ref('users/' + googleUser.sub + '/subscription').set(updated)
                            .catch(e => console.error('RTDB Update Error:', e));
                    }
                    
                    showToast('Đã chuyển sang gói Miễn phí', 'info');
                    return;
                }
                if (plan === 'enterprise') {
                    window.open('https://m.me/autopostpro', '_blank');
                    return;
                }
                setSelectedPlan(plan);
                setShowPaymentModal(true);
            }, [googleUser, t]);

            const handleConfirmPayment = useCallback((months = 1) => {
                const now = new Date();

                const historyEntry = {
                    id: Date.now(),
                    plan: selectedPlan,
                    months,
                    date: now.toISOString(),
                    status: 'pending',
                    amount: selectedPlan === 'pro' ? months * 199000 : months * 499000
                };

                const updatedSubscription = {
                    ...subscription,
                    status: 'pending',
                    pendingPlan: selectedPlan,
                    pendingMonths: months,
                    history: [historyEntry, ...(subscription.history || [])]
                };

                setSubscription(updatedSubscription);
                storage.set('subscription', updatedSubscription);

                // Update RTDB
                if (auth && rtdb && googleUser && googleUser.sub) {
                    rtdb.ref('users/' + googleUser.sub + '/subscription').set(updatedSubscription)
                        .then(() => {
                            showToast('Đã ghi nhận thanh toán! Đang chờ xác nhận.', 'success');
                        }).catch(e => {
                            console.error('RTDB Update Error:', e);
                            showToast('Đã ghi nhận (Offline). Lỗi đồng bộ hệ thống!', 'warning');
                        });
                } else {
                    showToast('Đã ghi nhận thanh toán! Đang chờ xác nhận.', 'success');
                }

                setShowPaymentModal(false);
            }, [selectedPlan, subscription, googleUser]);

            // Auto-check subscription expiry
            useEffect(() => {
                if (subscription.expiresAt && subscription.plan !== 'free') {
                    const daysLeft = getSubscriptionDaysLeft();
                    if (daysLeft <= 0 && subscription.status !== 'expired') {
                        setSubscription(prev => {
                            const updated = { ...prev, status: 'expired' };
                            storage.set('subscription', updated);
                            return updated;
                        });
                    }
                    if (daysLeft > 0 && daysLeft <= 3) {
                        showToast(`Gói ${subscription.plan.toUpperCase()} sắp hết hạn! Còn ${daysLeft} ngày.`, 'warning');
                    }
                }
            }, []);

            useEffect(() => { storage.set('subscription', subscription); }, [subscription]);

            useEffect(() => {
                document.documentElement.className = theme;
                storage.set('theme', theme);
            }, [theme]);
            useEffect(() => { storage.set('lang', lang); }, [lang]);
            useEffect(() => { storage.set('gemini_api_key', apiKey); }, [apiKey]);
            useEffect(() => { storage.set('active_page', activePage); }, [activePage]);
            useEffect(() => { storage.set('fb_groups', groups); }, [groups]);
            useEffect(() => { storage.set('fb_selected_groups', [...selectedGroups]); }, [selectedGroups]);
            useEffect(() => { storage.set('ai_custom_prompt', customPrompt); }, [customPrompt]);
            useEffect(() => { storage.set('gemini_model', model); }, [model]);
            useEffect(() => { storage.set('fb_post_content', content); }, [content]);
            useEffect(() => { imageDB.save(images); }, [images]);

            useEffect(() => {
                // If customPrompt doesn't have newline constraints, update it to defaultPrompt
                const saved = storage.get('ai_custom_prompt', '');
                if (saved && !saved.includes('xuống dòng') && !saved.includes('đoạn văn')) {
                    storage.set('ai_custom_prompt', defaultPrompt);
                    setCustomPrompt(defaultPrompt);
                }

                // Migrate legacy model selection to Gemma 4 26B A4B IT
                const savedModel = storage.get('gemini_model', '');
                if (!savedModel || savedModel.includes('gemma-3')) {
                    storage.set('gemini_model', 'gemini-3.1-flash-lite');
                    setModel('gemini-3.1-flash-lite');
                }
            }, []);

            const showToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
            };
            const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));
            const addLog = (type, message, link = null) => {
                const time = new Date().toLocaleTimeString('vi-VN');
                setLogs(prev => {
                    const lastLog = prev[prev.length - 1];
                    // Collapse consecutive countdown logs into one line (detect by pattern)
                    const isCountdown = message.includes('s trước nhóm') || message.includes('s trước nhóm');
                    const wasCountdown = lastLog && lastLog.message && lastLog.message.includes('s trước nhóm');

                    if (lastLog && isCountdown && wasCountdown) {
                        const newLogs = [...prev];
                        newLogs[newLogs.length - 1] = { time, type, message, link };
                        return newLogs;
                    }
                    return [...prev, { time, type, message, link }];
                });
            };

            // Pending posts tracker for Promise-based waiting
            const pendingPostsRef = React.useRef(new Map());

            const waitForPostResult = (groupId, timeoutMs = 60000) => {
                return new Promise((resolve, reject) => {
                    // Store resolver in pendingPosts map
                    pendingPostsRef.current.set(groupId, { resolve, reject });

                    // Timeout fallback
                    setTimeout(() => {
                        if (pendingPostsRef.current.has(groupId)) {
                            pendingPostsRef.current.delete(groupId);
                            reject(new Error('Timeout waiting for post result'));
                        }
                    }, timeoutMs);
                });
            };

            // Extension Messaging
            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.source !== window) return;
                    const { type, data } = event.data;
                    if (type === 'FB_TOOL_INSTALLED') {
                        setExtensionStatus(true);
                        // Request Facebook login check when extension is confirmed
                        window.postMessage({ type: 'CHECK_FACEBOOK_LOGIN' }, '*');
                    }
                    if (type === 'FB_USER_INFO') {
                        setFbUser(data);
                        storage.set('fb_user_info', data);
                        showToast(`Logged in as ${data.userName}`, 'success');
                    }
                    if (type === 'FB_LOGGED_IN') {
                        if (window.__fbClearTimer) {
                            clearTimeout(window.__fbClearTimer);
                            window.__fbClearTimer = null;
                        }
                        if (data) {
                            setFbUser(data);
                            storage.set('fb_user_info', data);
                        }
                    }
                    if (type === 'FB_NOT_LOGGED_IN') {
                        const handleClear = () => {
                            setFbUser(null);
                            storage.remove('fb_user_info');
                            if (window.__loginRequested) {
                                window.__loginRequested = false;
                                showToast('Chưa kết nối Facebook. Đang mở cửa sổ đăng nhập...', 'warning');
                                window.postMessage({ type: 'OPEN_FACEBOOK' }, '*');
                            }
                        };

                        const cachedFb = storage.get('fb_user_info', null);
                        if (cachedFb && !window.__loginRequested) {
                            if (!window.__fbClearTimer) {
                                window.__fbClearTimer = setTimeout(() => {
                                    handleClear();
                                    window.__fbClearTimer = null;
                                }, 1500);
                            }
                        } else {
                            if (window.__fbClearTimer) {
                                clearTimeout(window.__fbClearTimer);
                                window.__fbClearTimer = null;
                            }
                            handleClear();
                        }
                    }
                    if (type === 'GROUP_DATA') {
                        // Extension sends array of groups
                        const groupsArray = Array.isArray(data) ? data : [data];
                        setGroups(prev => {
                            const existingIds = new Set(prev.map(g => g.id));
                            const newGroups = groupsArray.filter(g => g && g.id && g.name && !existingIds.has(g.id));
                            return [...prev, ...newGroups];
                        });
                    }
                    if (type === 'STATUS_UPDATE') {
                        const msg = event.data.message;
                        if (msg && !msg.toLowerCase().includes('quét') && !msg.toLowerCase().includes('lấy danh sách')) {
                            addLog('info', msg);
                        }
                    }
                    if (type === 'ERROR') {
                        showToast(event.data.message, 'error');
                        addLog('error', event.data.message);
                        setIsScanningGroups(false);
                    }
                    if (type === 'COMPLETE') {
                        showToast('Quét nhóm thành công!', 'success');
                        addLog('success', 'Quét nhóm thành công');
                        setIsScanningGroups(false);
                    }
                    if (type === 'TOTAL_COUNT') {
                        // Suppress log
                    }
                    if (type === 'POST_SUCCESS') {
                        const { groupId, postId, postLink } = data;
                        showToast('Đăng thành công!', 'success');

                        // Look up group name from groups array
                        const groupObj = groups.find(g => g.id === groupId || g.id === String(groupId));
                        const groupName = groupObj ? groupObj.name : groupId;

                        if (postLink) {
                            addLog('success', `✅ Đăng bài OK: ${groupName}`, postLink);
                            addLog('info', `🔗 Link: ${postLink}`);
                        } else {
                            const groupUrl = `https://www.facebook.com/groups/${groupId}/`;
                            addLog('success', `✅ Đăng bài OK: ${groupName} (không lấy được link trực tiếp)`, groupUrl);
                        }

                        // Resolve pending promise
                        if (pendingPostsRef.current.has(groupId)) {
                            const { resolve } = pendingPostsRef.current.get(groupId);
                            pendingPostsRef.current.delete(groupId);
                            resolve({ success: true, postLink: postLink || null, postId });
                        }
                    }
                    if (type === 'POST_ERROR') {
                        const { groupId, message } = data;
                        showToast(`Lỗi đăng bài: ${message}`, 'error');
                        addLog('error', `❌ Lỗi đăng nhóm ${groupId}: ${message}`);

                        // Resolve pending promise with error (don't reject to continue loop)
                        if (pendingPostsRef.current.has(groupId)) {
                            const { resolve } = pendingPostsRef.current.get(groupId);
                            pendingPostsRef.current.delete(groupId);
                            resolve({ success: false, error: message });
                        }
                    }
                    // Anti-block handlers
                    if (type === 'RATE_LIMIT_REACHED') {
                        const { message, postsThisHour } = data;
                        setIsPosting(false);
                        showToast(message, 'error');
                        addLog('error', `Rate limit: Đã đăng ${postsThisHour} bài trong giờ này`);
                    }
                    if (type === 'CHECKPOINT_DETECTED') {
                        const { message, groupId } = data;
                        setIsPosting(false);
                        showToast('⚠️ Facebook yêu cầu xác minh! Dừng đăng bài.', 'error');
                        addLog('error', `Checkpoint detected tại nhóm ${groupId}. Cần xác minh tài khoản!`);
                    }
                    // Page Posts Feature Handlers
                    if (type === 'PAGE_POSTS_DATA') {
                        const postsArray = Array.isArray(data) ? data : [data];
                        setPagePosts(prev => {
                            const existingIds = new Set(prev.map(p => p.id));
                            const newPosts = postsArray.filter(p => p && p.id && !existingIds.has(p.id));
                            return [...prev, ...newPosts];
                        });
                        setIsScanning(false);
                    }
                    if (type === 'PAGE_POSTS_COMPLETE') {
                        setIsScanning(false);
                        showToast('Quét bài viết thành công!', 'success');
                        addLog('success', 'Quét bài viết thành công');
                    }
                    if (type === 'SHARE_SUCCESS') {
                        const { groupId, postUrl } = data;
                        showToast('Chia sẻ thành công!', 'success');
                        addLog('success', `Chia sẻ thành công lên nhóm: ${groupId}`, postUrl);
                    }
                    if (type === 'SHARE_ERROR') {
                        const { groupId, message } = data;
                        showToast(`Lỗi chia sẻ: ${message}`, 'error');
                        addLog('error', `Lỗi chia sẻ nhóm ${groupId}: ${message}`);
                    }
                    // Fetch Pages Handler
                    if (type === 'FB_PAGES_DATA') {
                        setFbPages(data || []);
                        setIsFetchingPages(false);
                        if (data && data.length > 0) {
                            showToast(`Tìm thấy ${data.length} Pages!`, 'success');
                        } else {
                            showToast('Không tìm thấy Pages nào!', 'warning');
                        }
                    }
                    if (type === 'CURRENT_PAGE_INFO') {
                        const page = data;
                        if (page) {
                            setSelectedPage(page);
                            setPageUrl(page.url);
                            storage.set('last_selected_page', page);

                            setFbPages(prev => {
                                if (!prev.find(p => p.id === page.id)) return [page, ...prev];
                                return prev;
                            });

                            addLog('success', `Đã lấy thông tin Page: ${page.name}`);
                            setIsFetchingPages(false);
                            // Auto scan posts after getting page
                            window.postMessage({ type: 'SCAN_PAGE_POSTS', pageUrl: page.url }, '*');
                        } else {
                            showToast('Không lấy được thông tin Page!', 'error');
                        }
                    }
                };
                window.addEventListener('message', handleMessage);

                // Load cached user info from localStorage
                const cachedUser = storage.get('fb_user_info');
                if (cachedUser) {
                    setFbUser(cachedUser);
                }

                // Check for extension and request login status
                window.postMessage({ type: 'CHECK_EXTENSION' }, '*');

                return () => window.removeEventListener('message', handleMessage);
            }, []);

            const handleScan = () => {
                if (!extensionStatus) return showToast('Vui lòng cài đặt Extension trước!', 'error');
                if (!fbUser) {
                    window.__loginRequested = true;
                    window.postMessage({ type: 'CHECK_FACEBOOK_LOGIN' }, '*');
                    showToast('Đang kết nối Facebook...', 'info');
                    return;
                }
                setGroups([]);
                setSelectedGroups(new Set());
                storage.remove('fb_groups');
                storage.remove('fb_selected_groups');
                setIsScanningGroups(true);
                window.postMessage({ type: 'START_EXTRACTION' }, '*');
            };

            const handleStopScan = () => {
                setIsScanningGroups(false);
                window.postMessage({ type: 'STOP_EXTRACTION' }, '*');
                showToast('Đã dừng quét nhóm', 'info');
            };



            // Fetch User's Facebook Pages
            const handleFetchPages = () => {
                if (!extensionStatus) return showToast('Vui lòng cài đặt Extension trước!', 'error');
                if (!fbUser) {
                    window.__loginRequested = true;
                    window.postMessage({ type: 'CHECK_FACEBOOK_LOGIN' }, '*');
                    showToast('Đang kết nối Facebook...', 'info');
                    return;
                }
                setIsFetchingPages(true);
                addLog('info', 'Đang lấy danh sách Pages...');
                window.postMessage({ type: 'FETCH_USER_PAGES' }, '*');
            };

            // Page Posts Feature Handlers
            const handleScanPagePosts = () => {
                if (!extensionStatus) return showToast('Install Extension first!', 'error');
                if (!pageUrl.trim()) return showToast('Vui lòng nhập URL trang Facebook!', 'error');

                setPagePosts([]);
                setSelectedPosts(new Set());
                setIsScanning(true);
                addLog('info', `Đang quét bài viết từ: ${pageUrl}`);
                window.postMessage({ type: 'SCAN_PAGE_POSTS', pageUrl: pageUrl.trim() }, '*');
            };

            const handleSharePosts = async () => {
                if (!extensionStatus) return showToast('Install Extension first!', 'error');
                if (selectedPosts.size === 0) return showToast('Vui lòng chọn ít nhất 1 bài viết!', 'error');
                if (selectedGroups.size === 0) return showToast('Vui lòng chọn ít nhất 1 nhóm!', 'error');

                // Subscription Check
                if (subscription.plan === 'free' && selectedGroups.size > 3) {
                    return showToast('Gói MIỄN PHÍ chỉ được chọn tối đa 3 nhóm. Vui lòng nâng cấp!', 'error');
                }
                if (subscription.plan !== 'free' && !isSubscriptionActive()) {
                    return showToast('Gói dịch vụ đã hết hạn. Vui lòng gia hạn để tiếp tục!', 'error');
                }

                setIsSharing(true);
                setProgress(0);
                const postsToShare = pagePosts.filter(p => selectedPosts.has(p.id));
                const groupsToShare = groups.filter(g => selectedGroups.has(g.id));
                const total = postsToShare.length * groupsToShare.length;

                addLog('info', `🚀 Bắt đầu chia sẻ ${postsToShare.length} bài viết lên ${groupsToShare.length} nhóm (không nội dung)`);

                let count = 0;
                let successCount = 0;
                for (const post of postsToShare) {
                    for (const group of groupsToShare) {
                        // Delay between shares (API is fast but need rate limiting)
                        if (count > 0) {
                            const delaySec = Math.floor(Math.random() * 3) + 3; // 3-5 seconds
                            for (let s = delaySec; s > 0; s--) {
                                addLog('info', `⏳ Đợi ${s}s trước nhóm tiếp theo...`);
                                await new Promise(r => setTimeout(r, 1000));
                            }
                        }

                        // Validate URL before sharing
                        let shareUrl = post.url || post.id;
                        if (!shareUrl || shareUrl === '' ||
                            shareUrl.endsWith('/photo/') ||
                            shareUrl.endsWith('/photo') ||
                            !shareUrl.includes('facebook.com')) {
                            addLog('error', `❌ URL không hợp lệ: ${shareUrl}`);
                            continue;
                        }

                        addLog('info', `📤 Chia sẻ bài viết → ${group.name}`);
                        window.postMessage({
                            type: 'SHARE_POST_TO_GROUP',
                            groupId: group.id,
                            groupUrl: group.url || `https://www.facebook.com/groups/${group.id}`,
                            postUrl: shareUrl
                        }, '*');

                        // Wait for share result (native share takes ~20-30 seconds)
                        try {
                            await new Promise((resolve, reject) => {
                                const timeout = setTimeout(() => {
                                    resolve({ success: false });
                                }, 120000); // 2 minute timeout

                                const handler = (event) => {
                                    if (event.source !== window) return;
                                    const { type, data } = event.data;
                                    if (type === 'SHARE_SUCCESS' && data && data.groupId === group.id) {
                                        clearTimeout(timeout);
                                        window.removeEventListener('message', handler);
                                        successCount++;
                                        resolve({ success: true });
                                    }
                                    if (type === 'SHARE_ERROR' && data && data.groupId === group.id) {
                                        clearTimeout(timeout);
                                        window.removeEventListener('message', handler);
                                        resolve({ success: false });
                                    }
                                };
                                window.addEventListener('message', handler);
                            });
                        } catch (e) {
                            addLog('error', `⏰ Timeout chia sẻ nhóm ${group.name}`);
                        }

                        count++;
                        setProgress(Math.round((count / total) * 100));
                    }
                }

                addLog('success', `✅ Hoàn thành! Chia sẻ thành công ${successCount}/${count} lượt`);
                setIsSharing(false);
                showToast(`Hoàn thành chia sẻ ${successCount}/${count} lượt!`, 'success');
            };

            // Helpers
            const spinContent = (text) => {
                if (!text) return "";
                // Handle nested spintax recursively or simple level
                // Simple regex for {a|b|c}
                return text.replace(/{([^{}]+)}/g, (match, p1) => {
                    const options = p1.split('|');
                    return options[Math.floor(Math.random() * options.length)];
                });
            };

            const shuffleArray = (array) => {
                let newArr = array.map((item, idx) => ({
                    ...item,
                    id: (item.id || idx) + '_' + Math.random().toString(36).substring(2, 7)
                }));
                for (let i = newArr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
                }
                return newArr;
            };

            const [groupVariations, setGroupVariations] = useState({});
            const rewritingIdsRef = useRef(new Set());

            // Sync group variations when selectedGroups, groups or spinEnabled changes.
            // Generates spinned text and shuffled images only for newly added groups to avoid annoying text flickering and image reshuffling while typing.
            useEffect(() => {
                setGroupVariations(prev => {
                    const next = { ...prev };
                    let changed = false;

                    // Remove variations for groups that are no longer selected
                    Object.keys(next).forEach(groupId => {
                        if (!selectedGroups.has(groupId)) {
                            delete next[groupId];
                            changed = true;
                        }
                    });

                    // Generate variation for newly selected groups
                    selectedGroups.forEach(groupId => {
                        if (!next[groupId]) {
                            const groupName = groups.find(g => g.id === groupId)?.name || '';
                            next[groupId] = {
                                content: spinEnabled ? spinContent(content) : content,
                                images: spinEnabled ? shuffleArray(images) : [...images],
                                groupName: groupName,
                                isAiRewritten: false,
                                isRewriting: false
                            };
                            changed = true;
                        }
                    });

                    return changed ? next : prev;
                });
            }, [selectedGroups, groups, spinEnabled]);

            // Safely update existing variations when the main editor content or images list updates
            useEffect(() => {
                setGroupVariations(prev => {
                    const next = { ...prev };
                    let changed = false;

                    selectedGroups.forEach(groupId => {
                        if (next[groupId]) {
                            const currentVar = next[groupId];
                            let nextContent = currentVar.content;
                            let nextImages = currentVar.images;
                            let nextIsAiRewritten = currentVar.isAiRewritten;
                            let nextIsRewriting = currentVar.isRewriting;

                            if (!spinEnabled) {
                                // If spin is disabled, content and images must exactly match the editor
                                if (currentVar.content !== content) {
                                    nextContent = content;
                                    nextIsAiRewritten = false;
                                    nextIsRewriting = false;
                                    changed = true;
                                }
                                if (currentVar.images.length !== images.length || JSON.stringify(currentVar.images.map(img => img.id)) !== JSON.stringify(images.map(img => img.id))) {
                                    nextImages = [...images];
                                    changed = true;
                                }
                            } else {
                                // If spin is enabled, keep spinned text stable while typing but update if editor is completely rewritten/cleared
                                if (!currentVar.content || currentVar.content.trim() === '' || !content.trim()) {
                                    nextContent = spinContent(content);
                                    nextIsAiRewritten = false;
                                    nextIsRewriting = false;
                                    changed = true;
                                }
                                // Shuffle only if number of images changed, avoiding aggressive re-shuffling on unrelated edits
                                if (currentVar.images.length !== images.length) {
                                    nextImages = shuffleArray(images);
                                    changed = true;
                                }
                            }

                            if (changed) {
                                next[groupId] = {
                                    ...currentVar,
                                    content: nextContent,
                                    images: nextImages,
                                    isAiRewritten: nextIsAiRewritten,
                                    isRewriting: nextIsRewriting
                                };
                            }
                        }
                    });

                    return changed ? next : prev;
                });
            }, [content, images, selectedGroups, spinEnabled]);

            // Background async trigger for Gemini rewrite per group in preview
            useEffect(() => {
                const geminiKey = storage.get('gemini_api_key', '') || apiKey;
                if (!geminiKey || !spinEnabled || isPosting) return;

                // Find any selected group variation that needs AI rewrite and is not currently rewriting or in the ref queue
                const groupsToRewrite = Object.keys(groupVariations).filter(groupId => {
                    const v = groupVariations[groupId];
                    return v && !v.isAiRewritten && !v.isRewriting && v.content.trim() && !rewritingIdsRef.current.has(groupId);
                });

                if (groupsToRewrite.length === 0) return;

                // Run rewrite for each group variation in the background
                groupsToRewrite.forEach(async (groupId) => {
                    // Mark in Ref immediately to prevent duplicate runs in subsequent ticks
                    rewritingIdsRef.current.add(groupId);

                    // Mark as rewriting in state
                    setGroupVariations(prev => {
                        if (!prev[groupId] || prev[groupId].isRewriting) return prev;
                        return {
                            ...prev,
                            [groupId]: {
                                ...prev[groupId],
                                isRewriting: true
                            }
                        };
                    });

                    try {
                        const originalText = groupVariations[groupId]?.content || content;
                        const groupName = groups.find(g => g.id === groupId)?.name || '';
                        
                        addLog('info', `🤖 [AI Preview] Đang tự động viết lại nội dung cho nhóm: ${groupName}...`);
                        const rewrittenText = await rewriteWithGemini(originalText, groupName);
                        const formattedText = formatSalesContent(rewrittenText);

                        setGroupVariations(prev => {
                            if (!prev[groupId]) return prev;
                            return {
                                ...prev,
                                [groupId]: {
                                    ...prev[groupId],
                                    content: formattedText,
                                    isRewriting: false,
                                    isAiRewritten: true
                                }
                            };
                        });
                    } catch (e) {
                        console.error("AI Preview rewrite failed", e);
                        showToast(`❌ AI viết lại nội dung nhóm "${groups.find(g => g.id === groupId)?.name || groupId}" thất bại: ${e.message}`, 'error');
                        setGroupVariations(prev => {
                            if (!prev[groupId]) return prev;
                            return {
                                ...prev,
                                [groupId]: {
                                    ...prev[groupId],
                                    isRewriting: false,
                                    isAiRewritten: true // set true to avoid infinite retry loops on error
                                }
                            };
                        });
                    } finally {
                        // Always clean up ref so it can trigger again on manual reshuffle
                        rewritingIdsRef.current.delete(groupId);
                    }
                });
            }, [groupVariations, selectedGroups, groups, apiKey, model, customPrompt, spinEnabled, isPosting]);

            // Expose a manual button callback to force a reshuffle/spin of all variations
            const regenerateVariations = () => {
                rewritingIdsRef.current.clear();
                const next = {};
                selectedGroups.forEach(groupId => {
                    const groupName = groups.find(g => g.id === groupId)?.name || '';
                    next[groupId] = {
                        content: spinEnabled ? spinContent(content) : content,
                        images: spinEnabled ? shuffleArray(images) : [...images],
                        groupName: groupName,
                        isAiRewritten: false,
                        isRewriting: false
                    };
                });
                setGroupVariations(next);
                
                const geminiKey = storage.get('gemini_api_key', '') || apiKey;
                if (!geminiKey) {
                    showToast("🔄 Đã đổi thứ tự ảnh! ⚠️ Hãy điền Gemini API Key ở mục Cấu hình AI để tự động viết lại nội dung khác nhau cho từng nhóm!", "warning");
                } else {
                    showToast("🔄 Đã spin lại nội dung & đảo vị trí ảnh thành công!", "success");
                }
            };

            // Helper: Format Sales Content (Preserve user formatting, normalize line breaks)
            const formatSalesContent = (text) => {
                if (!text) return "";
                return text
                    // Normalize different line break formats to single \n
                    .replace(/\r\n/g, '\n')
                    .replace(/\r/g, '\n')
                    // Normalize max 2 newlines (remove excessive spacing)
                    .replace(/\n{3,}/g, '\n\n')
                    .trim();
            };

            // Gemini API to rewrite content for uniqueness
            const rewriteWithGemini = async (text, groupName) => {
                const key = storage.get('gemini_api_key', '') || apiKey;
                if (!key) {
                    throw new Error('Chưa nhập API Key Gemini! Vui lòng điền khóa API ở mục Cấu hình AI.');
                }
                if (!text.trim()) {
                    return text;
                }

                try {
                    // Sử dụng prompt tùy chỉnh, thay thế {{content}} bằng nội dung thực
                    const prompt = customPrompt.replace(/\{\{content\}\}/gi, text);
                    addLog('info', `📝 Prompt: ${prompt.substring(0, 100)}...`);

                    const callGemini = async (modelName) => {
                        const versions = ['v1beta', 'v1'];
                        let lastRes = null;
                        for (const ver of versions) {
                            const body = {
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { 
                                    temperature: 0.75,
                                    maxOutputTokens: 2048 
                                }
                            };
                            
                            if (ver === 'v1beta' && modelName.includes('gemini')) {
                                body.system_instruction = { parts: [{ text: "Bạn là chuyên gia Content Marketing. CHỈ trả về duy nhất bài viết hoàn thiện cuối cùng." }] };
                            }

                            const url = `https://generativelanguage.googleapis.com/${ver}/models/${modelName}:generateContent?key=${key}`;
                            addLog('info', `🌐 Gọi API: ${ver}/models/${modelName}`);
                            
                            const response = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(body)
                            });
                            lastRes = response;
                            if (response.ok) {
                                addLog('success', `✅ API phản hồi OK (${ver}/${modelName})`);
                                return response;
                            }
                            addLog('warning', `⚠️ API ${ver}/${modelName} trả về ${response.status}`);
                            if (response.status !== 404) break;
                        }
                        return lastRes;
                    };

                    let response = await callGemini(model);
                    
                    // Xử lý Fallback
                    if (!response.ok) {
                        addLog('warning', `⚠️ Model ${model} thất bại (HTTP ${response.status}). Đang thử fallback...`);
                        const errorBody = await response.clone().text().catch(() => '');
                        addLog('error', `📋 API Error: ${errorBody.substring(0, 200)}`);
                        
                        const fallbacks = ['gemini-2.5-flash', 'gemini-2.0-flash'];
                        for (const fbModel of fallbacks) {
                            if (fbModel === model) continue;
                            addLog('info', `🔄 Thử fallback: ${fbModel}`);
                            response = await callGemini(fbModel);
                            if (response.ok) break;
                        }
                    }

                    if (response.ok) {
                        const data = await response.json();
                        let result = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                        
                        if (!result.trim()) {
                            addLog('error', '❌ AI trả về nội dung rỗng');
                            addLog('info', `📋 Response: ${JSON.stringify(data).substring(0, 300)}`);
                            return text;
                        }
                        
                        addLog('info', `📄 AI trả về ${result.length} ký tự, đang lọc...`);
                        
                        let allLines = result.split('\n').map(l => l.trim());

                        // 1. Cắt đuôi: Xóa mọi thứ sau dòng hashtag cuối cùng (nếu có)
                        let lastHashIdx = -1;
                        for (let i = allLines.length - 1; i >= 0; i--) {
                            if (allLines[i].match(/^#\w/)) { lastHashIdx = i; break; }
                        }
                        if (lastHashIdx !== -1) {
                            allLines[lastHashIdx] = allLines[lastHashIdx].replace(/(#\S+\s*)+.*/, (match) => {
                                const hashtags = match.match(/#\S+/g);
                                return hashtags ? hashtags.join(' ') : match;
                            });
                            allLines = allLines.slice(0, lastHashIdx + 1);
                        }

                        // 2. Tìm khối nháp của AI ĐỂ CẮT BỎ PHẦN TRÊN
                        let cutTopIdx = -1;
                        for (let i = 0; i < allLines.length; i++) {
                            const lower = allLines[i].toLowerCase();
                            if (lower.match(/^(final version|final draft|final attempt|text:|output:|bài viết:|here is|dưới đây là|let's try this|revised)/) ||
                                lower.includes('construction:')) {
                                cutTopIdx = i;
                            }
                        }
                        if (cutTopIdx !== -1) {
                            allLines = allLines.slice(cutTopIdx + 1);
                        }

                        // 3. Xóa các dòng rác báo cáo của AI
                        const badLineRegex = /^(emoji count|constraint check|final check|one more check|original content|target audience|tone requested|word count|word check)/i;
                        allLines = allLines.filter(l => !badLineRegex.test(l));

                        // 4. Xóa dòng chứa từ cấm
                        allLines = allLines.filter(l => !/^(Total|Wait|Perfect|I will|I should|Insight|Checklist)/i.test(l));

                        // 5. Xóa dòng tự kiểm tra
                        allLines = allLines.filter(l => !/\?\s*(Yes|No)\b/i.test(l));

                        // 6. Xóa nhãn nháp bị lọt
                        allLines = allLines.filter(l => !/^(Headline|Body|Bullet points|CTA|Hotline|Hashtags):\s/i.test(l));

                        // 7. Dọn dẹp markdown, xóa placeholder {CONTENT}, dấu ngoặc nhọn bọc ngoài, và dòng trống
                        let lines = allLines.map(l => l.replace(/\{CONTENT\}/gi, '').replace(/[`*]/g, '').trim()).filter(l => l.length > 0);
                        
                        // 8. Xóa dấu { } bọc ngoài nội dung (AI hay bọc theo template)
                        if (lines.length > 0 && lines[0].startsWith('{')) {
                            lines[0] = lines[0].replace(/^\{+\s*/, '');
                        }
                        if (lines.length > 0 && lines[lines.length - 1].endsWith('}')) {
                            lines[lines.length - 1] = lines[lines.length - 1].replace(/\s*\}+$/, '');
                        }
                        // Lọc lại dòng trống sau khi xóa ngoặc
                        lines = lines.filter(l => l.trim().length > 0);

                        const finalResult = lines.join('\n').trim();
                        addLog('success', `✅ Lọc xong: ${finalResult.length} ký tự`);
                        return finalResult;
                    } else {
                        const errText = await response.text().catch(() => 'Không đọc được response');
                        throw new Error(`HTTP ${response.status}: ${errText.substring(0, 150)}`);
                    }
                } catch (error) { 
                    console.error("AI API Error:", error); 
                    addLog('error', `❌ Lỗi API: ${error.message}`);
                    throw error;
                }
            };

            const sleep = (ms) => new Promise(r => setTimeout(r, ms));

            const handleTestGemini = async () => {
                if (!content.trim()) return showToast('Vui lòng nhập nội dung trước!', 'error');
                const key = storage.get('gemini_api_key', '');
                if (!key) return showToast('Chưa nhập API Key Gemini!', 'error');

                setIsRewriting(true);
                addLog('info', '✍️ Bắt đầu viết lại nội dung bằng AI...');

                try {
                    // 1. Spin first if enabled
                    const spinned = spinEnabled ? spinContent(content) : content;
                    if (spinEnabled) addLog('info', '🔀 Đã spin nội dung');

                    // 2. Rewrite
                    addLog('info', `🤖 Gọi Gemini (Model: ${model})...`);
                    const rewritten = await rewriteWithGemini(spinned, 'Viết lại');

                    if (rewritten && rewritten.trim() && rewritten.trim() !== content.trim() && rewritten.trim() !== spinned.trim()) {
                        addLog('success', `✅ AI đã viết lại thành công (${rewritten.length} ký tự)`);
                        // Hiệu ứng typing: gõ từng ký tự
                        setContent('');
                        let i = 0;
                        const speed = Math.max(5, Math.min(20, 2000 / rewritten.length)); // Tự điều chỉnh tốc độ
                        const typeInterval = setInterval(() => {
                            i++;
                            setContent(rewritten.substring(0, i));
                            if (i >= rewritten.length) {
                                clearInterval(typeInterval);
                                setIsRewriting(false);
                                showToast('Đã cập nhật nội dung mới! ✨', 'success');
                            }
                        }, speed);
                    } else {
                        setIsRewriting(false);
                        addLog('error', `❌ AI không viết lại được. Kết quả: "${rewritten ? rewritten.substring(0, 80) + '...' : '(rỗng)'}"`);
                        showToast('AI không thể viết lại nội dung. Kiểm tra API Key và Model trong log.', 'warning');
                    }
                } catch (err) {
                    setIsRewriting(false);
                    addLog('error', `❌ Lỗi viết lại: ${err.message}`);
                    showToast(`Lỗi viết lại: ${err.message}`, 'error');
                }
            };

            const handleStartPost = async () => {
                if (!extensionStatus) {
                    return showToast('Install Extension first!', 'error');
                }
                if (!content.trim()) {
                    return showToast('Vui lòng nhập nội dung bài viết!', 'error');
                }
                if (selectedGroups.size === 0) {
                    return showToast('Vui lòng chọn ít nhất 1 nhóm!', 'error');
                }

                // Subscription Check
                if (subscription.plan === 'free' && selectedGroups.size > 3) {
                    return showToast('Gói MIỄN PHÍ chỉ được chọn tối đa 3 nhóm. Vui lòng nâng cấp!', 'error');
                }
                if (subscription.plan !== 'free' && !isSubscriptionActive()) {
                    return showToast('Gói dịch vụ đã hết hạn. Vui lòng gia hạn để tiếp tục!', 'error');
                }

                showToast(`Đang đăng bài lên ${selectedGroups.size} nhóm...`, 'info');
                addLog('info', `Bắt đầu chiến dịch đăng bài lên ${selectedGroups.size} nhóm`);
                setIsPosting(true); // Add posting state if possible, or just rely on log

                const groupsToPost = groups.filter(g => selectedGroups.has(g.id));
                const total = groupsToPost.length;
                let successCount = 0;

                for (let i = 0; i < total; i++) {
                    const group = groupsToPost[i];

                    // 1. Process Content (Spin + AI Rewrite) and Shuffle Images
                    const variation = groupVariations[group.id] || {
                        content: spinEnabled ? spinContent(content) : content,
                        images: spinEnabled ? shuffleArray(images) : [...images]
                    };
                    let uniqueContent = variation.content;

                    // Only call Gemini during posting if it has not been pre-rewritten in the preview card
                    const geminiKey = storage.get('gemini_api_key', '');
                    if (geminiKey && !variation.isAiRewritten) {
                        addLog('info', `🤖 Gemini đang viết lại nội dung cho: ${group.name}...`);
                        uniqueContent = await rewriteWithGemini(uniqueContent, group.name);
                    }

                    // FORCE FORMATTING: Ensure line breaks even if Gemini fails or user input is raw
                    uniqueContent = formatSalesContent(uniqueContent);

                    // Use the exact image sequence from the variation
                    const uniqueImages = (variation.images || []).map(img => img.data);

                    // 2. Send Post Command
                    window.postMessage({
                        type: 'POST_TO_GROUP',
                        groupId: group.id,
                        groupUrl: group.url || `https://www.facebook.com/groups/${group.id}`,
                        content: uniqueContent, // Send STANDARD content (Extension handles CRLF)
                        images: uniqueImages
                    }, '*');

                    addLog('info', `📤 Đang đăng lên: ${group.name} (Ảnh: ${uniqueImages.length})`);

                    // 3. Wait for actual POST_SUCCESS or POST_ERROR response
                    let postResult = { success: false };
                    try {
                        postResult = await waitForPostResult(group.id, 180000);
                    } catch (e) {
                        addLog('error', `⏰ Timeout đăng nhóm ${group.name}`);
                    }

                    if (postResult.success) {
                        successCount++;
                    }

                    // Strict Progress: Only reach 100% if ALL posts succeed
                    setProgress(Math.round((successCount / total) * 100));

                    // 4. Countdown AFTER post result (before next group)
                    if (i < total - 1) {
                        try {
                            const savedMin = Number(storage.get('fb_delay_min', 60)) || 10;
                            const savedMax = Number(storage.get('fb_delay_max', 120)) || 30;
                            const dMax = savedMax > savedMin ? savedMax : (savedMin + 30);

                            const delaySec = Math.floor(Math.random() * (dMax - savedMin + 1)) + savedMin;
                            setPostingCountdown({ current: delaySec, total: delaySec });
                            for (let s = delaySec; s > 0; s--) {
                                setPostingCountdown({ current: s, total: delaySec });
                                const statusMsg = postResult.success
                                    ? `✅ Đăng xong! Đợi ${s}s trước nhóm tiếp theo...`
                                    : `⏳ Đợi ${s}s trước nhóm tiếp theo...`;
                                addLog('info', statusMsg);
                                await sleep(1000);
                            }
                            setPostingCountdown(null);
                        } catch (e) {
                            console.error('Delay Error:', e);
                            setPostingCountdown(null);
                            await sleep(5000);
                        }
                    }
                }

                setPostingCountdown(null);
                setIsPosting(false);
            };

            const currentSetupStep = (() => {
                if (!googleUser) return 0;
                if (!fbUser) return 1;
                return 2;
            })();

            const isFullySetup = currentSetupStep === 2;

            if (!authInitialized) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-background-light dark:bg-background-dark transition-colors duration-300">
                        <div className="flex flex-col items-center gap-4">
                            <div className="relative flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-primary to-indigo-600 shadow-lg shadow-primary/20 animate-pulse">
                                <span className="material-symbols-outlined text-white text-[32px]">offline_share</span>
                            </div>
                            <h1 className="text-lg font-bold bg-gradient-to-r from-primary to-indigo-500 bg-clip-text text-transparent">
                                AutoPost Pro
                            </h1>
                            <div className="w-6 h-6 border-2 border-primary border-t-transparent rounded-full animate-spin mt-2" />
                        </div>
                    </div>
                );
            }

            return (
                <ThemeContext.Provider value={{ theme, setTheme }}>
                    <LanguageContext.Provider value={{ lang, setLang, t }}>
                        <AppContext.Provider value={{ showToast, addLog }}>
                            <div className="min-h-screen flex flex-col bg-background-light dark:bg-background-dark text-text-main font-display antialiased transition-colors duration-300 selection:bg-primary/20 selection:text-primary">
                                {(!extensionStatus || !googleUser) ? (
                                    <div className="flex-1 flex flex-col items-center justify-center">
                                        <SetupWizard
                                            t={t}
                                            extensionStatus={extensionStatus}
                                            googleUser={googleUser}
                                            onGoogleLogin={handleGoogleLogin}
                                            subscription={subscription}
                                            fbUser={fbUser}
                                            onFBConnect={() => window.postMessage({ type: 'OPEN_FACEBOOK' }, '*')}
                                            groups={groups}
                                            onScanGroups={handleScan}
                                            isScanningGroups={isScanningGroups}
                                            setActivePage={setActivePage}
                                        />
                                    </div>
                                ) : (
                                    <>
                                        <Header 
                                            extensionStatus={extensionStatus} 
                                            fbUser={fbUser} 
                                            setFbUser={setFbUser} 
                                            googleUser={googleUser} 
                                            onGoogleLogin={handleGoogleLogin} 
                                            onGoogleLogout={handleGoogleLogout} 
                                            subscription={subscription} 
                                            userRole={userRole} 
                                            setActivePage={setActivePage} 
                                            getSubscriptionTimeLeft={getSubscriptionTimeLeft}
                                        />
                                        <div className="flex flex-1">
                                            {/* Professional Collapsible Sidebar */}
                                            <aside className={`hidden lg:flex flex-col bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 fixed top-0 left-0 h-screen z-[60] transition-all duration-300 ease-out ${sidebarCollapsed ? 'w-14' : 'w-52'}`}>
                                                <div className={`h-16 flex items-center border-b border-gray-200 dark:border-slate-800 ${sidebarCollapsed ? 'justify-center px-2' : 'px-3 gap-2'}`}>
                                                    <div className="w-9 h-9 rounded-xl bg-primary/10 flex items-center justify-center flex-shrink-0 overflow-hidden">
                                                        {settings.logoUrl ? (
                                                            <img src={settings.logoUrl} className="w-full h-full object-cover" alt="Logo" />
                                                        ) : (
                                                            <span className="material-symbols-outlined text-primary text-xl">rocket_launch</span>
                                                        )}
                                                    </div>
                                                    {!sidebarCollapsed && (
                                                        <div className="overflow-hidden">
                                                            <span className="font-bold text-text-main dark:text-white text-sm block leading-tight">{settings.appName || 'AutoPost Pro'}</span>
                                                            <span className="text-[10px] text-text-secondary">Enterprise</span>
                                                        </div>
                                                    )}
                                                </div>
                                                <button onClick={() => { setSidebarCollapsed(prev => { storage.set('sidebar_collapsed', !prev); return !prev; }); }} className="absolute -right-3 top-4 w-6 h-6 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-full shadow-md flex items-center justify-center hover:bg-gray-50 dark:hover:bg-slate-700 transition-all z-10">
                                                    <span className={`material-symbols-outlined text-sm text-gray-500 transition-transform duration-300 ${sidebarCollapsed ? 'rotate-180' : ''}`}>chevron_left</span>
                                                </button>
                                                <nav className={`flex-1 py-3 space-y-1 ${sidebarCollapsed ? 'px-1.5' : 'px-2'}`}>
                                                    <button onClick={() => setActivePage('post')} className={`w-full flex items-center rounded-lg text-left transition-all ${sidebarCollapsed ? 'justify-center p-2.5' : 'gap-3 px-3 py-2.5'} ${activePage === 'post' ? 'bg-primary text-white' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-800'}`} title={t('nav_post')}>
                                                        <span className="material-symbols-outlined text-xl flex-shrink-0">edit_note</span>
                                                        {!sidebarCollapsed && <span className="font-medium text-sm whitespace-nowrap">{t('nav_post')}</span>}
                                                    </button>
