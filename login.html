<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - AutoPost Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Material Symbols Outlined';
            font-style: normal;
            font-weight: 100 700;
            src: url('assets/fonts/material-symbols-outlined.woff2') format('woff2');
        }
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-full flex items-center justify-center relative overflow-hidden font-sans">
    
    <!-- Neon Background Glows -->
    <div class="absolute w-[500px] h-[500px] rounded-full bg-blue-500/10 blur-[120px] -top-40 -left-40 pointer-events-none"></div>
    <div class="absolute w-[500px] h-[500px] rounded-full bg-purple-500/10 blur-[120px] -bottom-40 -right-40 pointer-events-none"></div>

    <!-- Login Container -->
    <div id="login-card" class="w-full max-w-md p-8 sm:p-10 mx-4 bg-slate-900/60 backdrop-blur-xl border border-slate-800/80 rounded-3xl shadow-2xl relative z-10 transition-all duration-300 transform scale-95 opacity-0">
        
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-600 to-purple-600 shadow-lg shadow-blue-500/20 mb-4 animate-bounce">
                <span class="material-symbols-outlined text-white text-3xl">rocket_launch</span>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                AutoPost Pro
            </h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">Hệ thống tự động đăng bài chuyên nghiệp</p>
        </div>

        <!-- Features list -->
        <div class="space-y-3.5 mb-8 bg-slate-950/40 p-5 rounded-2xl border border-slate-800/50">
            <div class="flex items-center gap-3 text-slate-300 text-sm">
                <span class="material-symbols-outlined text-blue-400 text-lg">check_circle</span>
                <span>Tự động quét và lọc nhóm Facebook</span>
            </div>
            <div class="flex items-center gap-3 text-slate-300 text-sm">
                <span class="material-symbols-outlined text-purple-400 text-lg">check_circle</span>
                <span>Lưu bộ sưu tập nhóm yêu thích</span>
            </div>
            <div class="flex items-center gap-3 text-slate-300 text-sm">
                <span class="material-symbols-outlined text-emerald-400 text-lg">check_circle</span>
                <span>Realtime Database đồng bộ tức thì</span>
            </div>
        </div>

        <!-- Loading spinner placeholder -->
        <div id="loading" class="hidden flex-col items-center justify-center py-6">
            <span class="material-symbols-outlined text-blue-500 text-4xl animate-spin">progress_activity</span>
            <p id="loading-text" class="text-slate-400 text-sm mt-3 font-medium">Đang xử lý đăng nhập...</p>
        </div>

        <!-- Action Button -->
        <div id="auth-actions" class="space-y-4">
            <button id="btn-login" class="w-full flex items-center justify-center gap-3 px-5 py-4 bg-white hover:bg-slate-50 text-slate-900 font-semibold rounded-2xl shadow-xl transition-all duration-200 active:scale-[0.98] group">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.54 14.98 1 12 1 7.35 1 3.37 3.65 1.4 7.56l3.89 3.02C6.21 7.37 8.9 5.04 12 5.04z"/>
                    <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.47h6.46c-.28 1.47-1.11 2.71-2.36 3.55l3.66 2.84c2.14-1.97 3.37-4.87 3.37-8.5z"/>
                    <path fill="#FBBC05" d="M5.29 14.54a7.12 7.12 0 0 1 0-4.54L1.4 6.98A11.96 11.96 0 0 0 1 12c0 1.76.38 3.43 1.05 4.93l3.24-2.39z"/>
                    <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.66-2.84c-1.01.68-2.31 1.09-4.3 1.09-3.1 0-5.79-2.33-6.71-5.54l-3.89 3.02C3.37 20.35 7.35 23 12 23z"/>
                </svg>
                <span>Đăng nhập với Google</span>
            </button>
            <a href="index.html" class="block text-center text-slate-400 hover:text-slate-200 text-sm font-medium transition-colors">
                Quay lại trang chủ
            </a>
        </div>

    </div>

    <!-- Modern Toast Message -->
    <div id="toast" class="fixed top-5 right-5 z-50 transform translate-y-[-100px] opacity-0 transition-all duration-300 bg-red-500 text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-3">
        <span id="toast-icon" class="material-symbols-outlined">error</span>
        <span id="toast-msg" class="text-sm font-medium"></span>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCvxzc0u0lxvY5JxEIWKOp59pAGb78ocdA",
            authDomain: "autopost-8f16e.firebaseapp.com",
            databaseURL: "https://autopost-8f16e-default-rtdb.firebaseio.com",
            projectId: "autopost-8f16e",
            storageBucket: "autopost-8f16e.firebasestorage.app",
            messagingSenderId: "213973905650",
            appId: "1:213973905650:web:4875b21b380eda1a2de06b"
        };

        // Initialize Firebase safely
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const rtdb = firebase.database();

        // Fetch dynamic branding settings
        rtdb.ref('settings').on('value', snap => {
            const settingsVal = snap.val();
            if (settingsVal) {
                if (settingsVal.appName) {
                    document.title = `Đăng nhập - ${settingsVal.appName}`;
                    const titleEl = document.querySelector('h1');
                    if (titleEl) titleEl.innerText = settingsVal.appName;
                }
            }
        });

        // DOM elements
        const card = document.getElementById('login-card');
        const btnLogin = document.getElementById('btn-login');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const authActions = document.getElementById('auth-actions');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');

        // Show card with animation
        setTimeout(() => {
            card.classList.remove('scale-95', 'opacity-0');
            card.classList.add('scale-100', 'opacity-100');
        }, 100);

        // Toast Helper
        function showToast(msg, type = 'error') {
            toastMsg.innerText = msg;
            toast.className = `fixed top-5 right-5 z-50 transform translate-y-0 opacity-100 transition-all duration-300 px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-3 ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'} text-white`;
            document.getElementById('toast-icon').innerText = type === 'success' ? 'check_circle' : 'error';
            setTimeout(() => {
                toast.className = "fixed top-5 right-5 z-50 transform translate-y-[-100px] opacity-0 transition-all duration-300 bg-red-500 text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-3";
            }, 3000);
        }

        // Get Query Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect') || 'index.html';

        // Check auth status
        auth.onAuthStateChanged(user => {
            if (user) {
                authActions.classList.add('hidden');
                loading.classList.remove('hidden');
                loadingText.innerText = "Đang kiểm tra quyền truy cập...";

                // Fetch or Initialize User node in RTDB
                rtdb.ref('users/' + user.uid).once('value').then(snapshot => {
                    let userData = snapshot.val();
                    if (!userData) {
                        const initSub = { plan: 'free', expiresAt: null, status: 'active', history: [] };
                        userData = {
                            name: user.displayName,
                            email: user.email,
                            picture: user.photoURL,
                            createdAt: new Date().toISOString(),
                            subscription: initSub,
                            role: 'user'
                        };
                        rtdb.ref('users/' + user.uid).set(userData);
                    }
                    
                    // Success! Save to local storage for speed and redirect
                    const storageUser = {
                        name: user.displayName,
                        email: user.email,
                        picture: user.photoURL,
                        sub: user.uid
                    };
                    localStorage.setItem('google_user', JSON.stringify(storageUser));
                    if (userData && userData.subscription) {
                        localStorage.setItem('subscription', JSON.stringify(userData.subscription));
                    }
                    
                    showToast('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    setTimeout(() => {
                        window.location.href = redirect;
                    }, 1000);
                }).catch(e => {
                    console.error('RTDB read error', e);
                    window.location.href = 'index.html';
                });
            } else {
                authActions.classList.remove('hidden');
                loading.classList.add('hidden');
            }
        });

        // Click handler
        btnLogin.addEventListener('click', () => {
            if (location.protocol === 'file:') {
                showToast('Không hỗ trợ đăng nhập Google từ file:// trực tiếp. Vui lòng khởi chạy qua server (http://localhost).');
                return;
            }
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(err => {
                showToast('Lỗi đăng nhập: ' + err.message);
            });
        });
    </script>
</body>
</html>
