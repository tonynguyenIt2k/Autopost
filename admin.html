<body class="flex h-screen overflow-hidden bg-background font-body-md text-on-surface">

    <div id="root" class="flex w-full h-full"></div>

    <!-- React and Babel Libs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.0/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCvxzc0u0lxvY5JxEIWKOp59pAGb78ocdA",
            authDomain: "autopost-8f16e.firebaseapp.com",
            databaseURL: "https://autopost-8f16e-default-rtdb.firebaseio.com",
            projectId: "autopost-8f16e",
            storageBucket: "autopost-8f16e.firebasestorage.app",
            messagingSenderId: "213973905650",
            appId: "1:213973905650:web:4875b21b380eda1a2de06b"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();
        const auth = firebase.auth();

        // Bootstrapped Admin UIDs
        const ADMIN_UIDS = [
            "112937746933560753066", // Admin 1
            "113264177727144211176"  // Admin 2
        ];

        function App() {
            const [adminUser, setAdminUser] = useState(null);
            const [users, setUsers] = useState([]);
            const [tab, setTab] = useState('pending');
            const [search, setSearch] = useState('');
            const [filterPlan, setFilterPlan] = useState('all');
            const [filterStatus, setFilterStatus] = useState('all');
            const [loading, setLoading] = useState(false);
            const [editModal, setEditModal] = useState(null);
            const [toast, setToast] = useState(null);
            const [settings, setSettings] = useState({
                appName: 'AutoPost Pro',
                logoUrl: '',
                bankName: 'mbbank',
                bankNo: '',
                bankUser: '',
                qrTemplate: ''
            });

            const [showAdminDropdown, setShowAdminDropdown] = useState(false);
            const [showMobileSidebar, setShowMobileSidebar] = useState(false);
            const dropdownRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setShowAdminDropdown(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => {
                    document.removeEventListener("mousedown", handleClickOutside);
                };
            }, [dropdownRef]);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            // Dynamic Title Synchronization
            useEffect(() => {
                if (settings.appName) {
                    document.title = `Quản trị - ${settings.appName}`;
                }
            }, [settings.appName]);

            // Authentication state listener
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(user => {
                    if (user) {
                        setLoading(true);
                        rtdb.ref('users/' + user.uid).once('value').then(snapshot => {
                            const val = snapshot.val();
                            const isHardcodedAdmin = ADMIN_UIDS.includes(user.uid) || 
                                user.providerData.some(p => ADMIN_UIDS.includes(p.uid));
                                
                            if ((val && val.role === 'admin') || isHardcodedAdmin) {
                                setAdminUser(user);
                            } else {
                                showToast('⚠️ Tài khoản của bạn không có quyền truy cập trang quản trị!', 'error');
                                auth.signOut();
                                setAdminUser(null);
                            }
                            setLoading(false);
                        }).catch(err => {
                            console.error(err);
                            showToast('Lỗi kiểm tra quyền hạn cơ sở dữ liệu!', 'error');
                            setLoading(false);
                        });
                    } else {
                        setAdminUser(null);
                    }
                });
                return unsub;
            }, []);

            // Google login handler
            const handleLogin = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    showToast('❌ Lỗi đăng nhập: ' + e.message, 'error');
                }
            };

            // System Settings Listener
            useEffect(() => {
                if (!adminUser) return;
                const settingsRef = rtdb.ref('settings');
                const onSettingsVal = settingsRef.on('value', snapshot => {
                    const val = snapshot.val();
                    if (val) {
                        setSettings({
                            appName: val.appName || 'AutoPost Pro',
                            logoUrl: val.logoUrl || '',
                            bankName: val.bankName || 'mbbank',
                            bankNo: val.bankNo || '',
                            bankUser: val.bankUser || '',
                            qrTemplate: val.qrTemplate || ''
                        });
                    }
                });
                return () => {
                    settingsRef.off('value', onSettingsVal);
                };
            }, [adminUser]);

            // Users synchronization listener
            useEffect(() => {
                if (!adminUser) return;
                setLoading(true);
                const usersRef = rtdb.ref('users');
                const onValue = usersRef.on('value', snapshot => {
                    const data = snapshot.val() || {};
                    const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                    setUsers(list);
                    setLoading(false);
                }, err => {
                    console.error(err);
                    showToast('Lỗi kết nối Realtime Database!', 'error');
                    setLoading(false);
                });
                return () => {
                    usersRef.off('value', onValue);
                };
            }, [adminUser]);

            // Computed Stats
            const stats = useMemo(() => {
                let total = users.length;
                let pending = 0;
                let active = 0;
                let revenue = 0;

                users.forEach(u => {
                    const sub = u.subscription || {};
                    if (sub.status === 'pending') pending++;
                    if (sub.status === 'active') active++;
                    
                    (sub.history || []).forEach(h => {
                        if (h.status === 'approved') {
                            revenue += (h.amount || 0);
                        }
                    });
                });

                return { total, pending, active, revenue };
            }, [users]);

            // Filter logic
            const filtered = useMemo(() => {
                return users.filter(u => {
                    const sub = u.subscription || {};
                    
                    // Tab-level segregation
                    if (tab === 'pending' && sub.status !== 'pending') return false;
                    if (tab === 'active' && sub.status !== 'active') return false;

                    // Plan selection
                    if (filterPlan !== 'all' && (sub.plan || 'free') !== filterPlan) return false;

                    // Custom status search
                    if (tab === 'all' && filterStatus !== 'all' && (sub.status || 'active') !== filterStatus) return false;

                    // Keyword query
                    const term = search.toLowerCase();
                    const name = (u.name || '').toLowerCase();
                    const email = (u.email || '').toLowerCase();
                    return name.includes(term) || email.includes(term) || u.id.toLowerCase().includes(term);
                }).sort((a, b) => {
                    // Show pending ones first
                    const aPend = a.subscription?.status === 'pending' ? 1 : 0;
                    const bPend = b.subscription?.status === 'pending' ? 1 : 0;
                    return bPend - aPend;
                });
            }, [users, tab, search, filterPlan, filterStatus]);

            // Subscription approval
            const handleApprove = async (userId) => {
                const user = users.find(u => u.id === userId);
                if (!user) return;
                const sub = user.subscription || {};
                const now = new Date();
                const exp = new Date(now);

                const requestedPlan = sub.pendingPlan || 'pro';
                const requestedMonths = parseInt(sub.pendingMonths || 1);

                exp.setMonth(exp.getMonth() + requestedMonths);

                const updatedHistory = (sub.history || []).map(h => {
                    if (h.status === 'pending') {
                        return { ...h, status: 'approved', date: now.toISOString() };
                    }
                    return h;
                });

                const updatedSub = {
                    ...sub,
                    plan: requestedPlan,
                    status: 'active',
                    expiresAt: exp.toISOString(),
                    pendingPlan: null,
                    pendingMonths: null,
                    history: updatedHistory
                };

                await rtdb.ref('users/' + userId + '/subscription').set(updatedSub);
                showToast('🚀 Đã duyệt nâng cấp gói thành công!', 'success');
            };

            // Subscription rejection
            const handleReject = async (userId) => {
                const user = users.find(u => u.id === userId);
                if (!user) return;
                const sub = user.subscription || {};
                const now = new Date();

                const updatedHistory = (sub.history || []).map(h => {
                    if (h.status === 'pending') {
                        return { ...h, status: 'rejected', date: now.toISOString() };
                    }
                    return h;
                });

                const updatedSub = {
                    ...sub,
                    status: 'active',
                    pendingPlan: null,
                    pendingMonths: null,
                    history: updatedHistory
                };

                await rtdb.ref('users/' + userId + '/subscription').set(updatedSub);
                showToast('❌ Đã từ chối nâng cấp gói dịch vụ!');
            };

            // Edit Modal Handler
            const handleEditSave = async (userId, plan, months, status, role) => {
                const user = users.find(u => u.id === userId);
                if (!user) return;
                const now = new Date();
                let expiresAt = null;
                if (plan !== 'free' && months > 0) {
                    const exp = new Date(now);
                    exp.setMonth(exp.getMonth() + parseInt(months));
                    expiresAt = exp.toISOString();
                }
                const historyEntry = {
                    id: Date.now(),
                    plan, months: parseInt(months),
                    date: now.toISOString(),
                    status: status === 'active' ? 'approved' : status,
                    amount: plan === 'pro' ? months * 199000 : plan === 'enterprise' ? months * 499000 : 0,
                    note: 'Admin edited'
                };
                const sub = {
                    ...(user.subscription || {}),
                    plan, status, expiresAt,
                    pendingPlan: null,
                    pendingMonths: null,
                    history: [historyEntry, ...(user.subscription?.history || [])]
                };
                
                await rtdb.ref('users/' + userId + '/subscription').set(sub);
                await rtdb.ref('users/' + userId + '/role').set(role);

                setEditModal(null);
                showToast('💾 Đã cập nhật người dùng thành công!', 'success');
            };

            // System settings update
            const handleSaveSettings = async (e) => {
                e.preventDefault();
                try {
                    await rtdb.ref('settings').set(settings);
                    showToast('💾 Đã lưu cấu hình hệ thống thành công!', 'success');
                } catch (error) {
                    showToast('❌ Lỗi lưu cấu hình: ' + error.message, 'error');
                }
            };

            // Sidebar component rendering
            const renderSidebarContent = () => (
                <div className="flex flex-col h-full">
                    <div className="flex items-center gap-3 mb-10 px-2">
                        {settings.logoUrl ? (
                            <img src={settings.logoUrl} className="w-10 h-10 rounded-xl object-cover border border-slate-700" alt="Logo" />
                        ) : (
                            <span className="material-symbols-outlined text-primary text-3xl" data-weight="fill" style={{fontVariationSettings: '"FILL" 1'}}>admin_panel_settings</span>
                        )}
                        <div>
                            <h1 className="font-headline-md text-headline-md font-bold text-on-surface leading-tight truncate max-w-[130px]">{settings.appName || 'AutoPost Pro'}</h1>
                            <p className="font-body-sm text-[10px] uppercase font-bold tracking-widest text-on-surface-variant/80">Admin Control</p>
                        </div>
                    </div>
                    
                    <nav className="flex-1 flex flex-col gap-2">
                        <button onClick={() => { setTab('pending'); setShowMobileSidebar(false); }} className={`flex items-center gap-3 px-4 py-3 rounded-lg font-bold transition-all text-left ${tab === 'pending' ? 'bg-primary-container text-on-primary-container shadow-md' : 'text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50'}`}>
                            <span className="material-symbols-outlined text-xl">dashboard</span>
                            <span className="font-label-md text-label-md">Bảng điều khiển</span>
                        </button>
                        <button onClick={() => { setTab('all'); setShowMobileSidebar(false); }} className={`flex items-center gap-3 px-4 py-3 rounded-lg font-bold transition-all text-left ${tab === 'all' ? 'bg-primary-container text-on-primary-container shadow-md' : 'text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50'}`}>
                            <span className="material-symbols-outlined text-xl">group</span>
                            <span className="font-label-md text-label-md">Quản lý thành viên</span>
                        </button>
                        <button onClick={() => { setTab('pending'); setShowMobileSidebar(false); }} className={`flex items-center gap-3 px-4 py-3 rounded-lg font-bold transition-all text-left ${tab === 'pending' ? 'bg-primary-container text-on-primary-container shadow-md' : 'text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50'}`}>
                            <span className="material-symbols-outlined text-xl">pending_actions</span>
                            <span className="font-label-md text-label-md flex-1">Đơn chờ duyệt</span>
                            {stats.pending > 0 && (
                                <span className="bg-error text-on-error text-xs font-bold px-2 py-0.5 rounded-full">{stats.pending}</span>
                            )}
                        </button>
                        <button onClick={() => { setTab('settings'); setShowMobileSidebar(false); }} className={`flex items-center gap-3 px-4 py-3 rounded-lg font-bold transition-all text-left ${tab === 'settings' ? 'bg-primary-container text-on-primary-container shadow-md' : 'text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50'}`}>
                            <span className="material-symbols-outlined text-xl">settings</span>
                            <span className="font-label-md text-label-md">Cấu hình hệ thống</span>
                        </button>
                    </nav>

                    <div className="mt-auto flex flex-col gap-4 border-t border-outline-variant/10 pt-6">
                        <div className="flex flex-col gap-2">
                            <a className="flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:text-on-surface transition-colors" href="index.html">
                                <span className="material-symbols-outlined text-sm">home</span>
                                <span className="font-label-md text-label-md text-sm">Về trang chủ</span>
                            </a>
                            <button onClick={() => { auth.signOut(); }} className="w-full flex items-center gap-3 px-4 py-2 text-error hover:text-error/80 transition-colors text-left">
                                <span className="material-symbols-outlined text-sm">logout</span>
                                <span className="font-label-md text-label-md text-sm">Đăng xuất</span>
                            </button>
                        </div>
                    </div>
                </div>
            );

            if (!adminUser) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 w-full">
                        <div className="w-full max-w-md p-8 sm:p-10 bg-slate-900/60 backdrop-blur-xl border border-slate-800/80 rounded-3xl shadow-2xl relative z-10 transition-all duration-300 animate-slide-in">
                            <div className="text-center mb-8">
                                <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-600 to-purple-600 shadow-lg shadow-blue-500/20 mb-4">
                                    <span className="material-symbols-outlined text-white text-3xl">shield_person</span>
                                </div>
                                <h1 className="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                                    {settings.appName || 'AutoPost Pro'}
                                </h1>
                                <p className="text-slate-400 text-sm mt-2 font-medium">Bảng Điều Khiển Quản Trị Hệ Thống</p>
                            </div>
                            <div className="space-y-4 mb-8 bg-slate-950/40 p-5 rounded-2xl border border-slate-800/50 text-slate-300 text-sm">
                                <div className="flex items-center gap-3">
                                    <span className="material-symbols-outlined text-blue-400">verified_user</span>
                                    <span>Yêu cầu quyền hạn Admin để đăng nhập</span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className="material-symbols-outlined text-purple-400">sync</span>
                                    <span>Thời gian thực đồng bộ dữ liệu</span>
                                </div>
                            </div>
                            <button className="w-full flex items-center justify-center gap-3 px-5 py-4 bg-white hover:bg-slate-100 text-slate-900 font-semibold rounded-2xl shadow-xl transition-all duration-200 active:scale-[0.98] group" onClick={handleLogin}>
                                <svg className="w-5 h-5" viewBox="0 0 24 24">
                                    <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.54 14.98 1 12 1 7.35 1 3.37 3.65 1.4 7.56l3.89 3.02C6.21 7.37 8.9 5.04 12 5.04z"/>

                                                    <span className="text-[10px] font-bold text-slate-450 mb-4 flex items-center gap-1.5 uppercase tracking-wider">
                                                        <span className="material-symbols-outlined text-base">qr_code_2</span> Bản xem trước mã QR duyệt gói demo
                                                    </span>
                                                    {settings.bankNo ? (
                                                        <div className="bg-white p-3 rounded-2xl shadow-xl flex-shrink-0 animate-slide-in border border-slate-200">
                                                            <img src={`https://img.vietqr.io/image/${settings.bankName || 'mbbank'}-${settings.bankNo}-compact.png?amount=199000&addInfo=DEMO_PREVIEW&accountName=${encodeURIComponent(settings.bankUser || 'CHUTAIKHOAN')}`} className="w-[180px] h-[180px] object-contain block" alt="QR Preview" />
                                                        </div>
                                                    ) : (
                                                        <div className="text-xs text-slate-555 italic h-[180px] flex items-center">Nhập STK để tạo mã QR tự động hiển thị tại đây...</div>
                                                    )}
                                                </div>
                                            </div>

                                            <button type="submit" className="w-full py-4 bg-primary hover:bg-opacity-90 text-slate-950 font-black rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2 active:scale-[0.99] duration-150">
                                                <span className="material-symbols-outlined">save</span> Lưu cấu hình hệ thống
                                            </button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        {/* Users Grid/Table */}
                                        <div className="bg-slate-900/60 backdrop-blur-xl border border-slate-800/80 rounded-3xl overflow-hidden shadow-xl">
                                            {loading ? (
                                                <div className="flex flex-col items-center justify-center py-20 text-slate-400 gap-3">
                                                    <span className="material-symbols-outlined text-4xl animate-spin text-primary">progress_activity</span>
                                                    <p className="text-xs font-medium">Đang tải danh sách thành viên...</p>
                                                </div>
                                            ) : filtered.length === 0 ? (
                                                <div className="flex flex-col items-center justify-center py-20 text-slate-500 gap-3">
                                                    <span className="material-symbols-outlined text-5xl opacity-40">inbox</span>
                                                    <p className="text-xs font-medium">Không tìm thấy người dùng phù hợp...</p>
                                                </div>
                                            ) : (
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left border-collapse min-w-[1000px]">
                                                        <thead>
                                                            <tr className="border-b border-slate-800 bg-slate-950/30">
                                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Người dùng</th>
                                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Quyền hạn</th>
                                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Gói dịch vụ</th>
                                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Trạng thái</th>
                                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Hạn dùng</th>
                                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Đăng ký</th>
                                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Đã nộp</th>
                                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Thời gian giao dịch</th>
                                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Hành động</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-800/50">
                                                            {filtered.map(u => {
                                                                const sub = u.subscription || {};
                                                                const latest = (sub.history || [])[0];
                                                                const exp = sub.expiresAt ? new Date(sub.expiresAt) : null;
                                                                const daysLeft = exp ? Math.ceil((exp - new Date()) / 86400000) : null;
                                                                return (
                                                                    <tr key={u.id} className="hover:bg-slate-850/40 transition-colors">
                                                                        <td className="px-6 py-4">
                                                                            <div className="flex items-center gap-3">
                                                                                <img src={u.picture || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.name || 'U')}&background=1e293b&color=e2e8f0`} className="w-10 h-10 rounded-full border border-slate-700 shadow-inner flex-shrink-0" alt="Avatar" />
                                                                                <div className="overflow-hidden max-w-[180px]">
                                                                                    <div className="font-bold text-slate-200 truncate">{u.name || 'Thành viên mới'}</div>
                                                                                    <div className="text-[10px] text-slate-400 truncate">{u.email || u.id}</div>
                                                                                </div>
                                                                            </div>
                                                                        </td>
                                                                        <td className="px-6 py-4">
                                                                            <span className={`inline-flex px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider ${u.role === 'admin' ? 'bg-primary/20 text-blue-400 border border-primary/30' : 'bg-slate-800 text-slate-400'}`}>
                                                                                {u.role === 'admin' ? 'ADMIN' : 'USER'}
                                                                            </span>
                                                                        </td>
                                                                        <td className="px-6 py-4">
                                                                            <div className="flex flex-col gap-1">
                                                                                <span className={`inline-flex w-fit px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider ${sub.plan === 'pro' ? 'bg-amber-500/10 text-amber-500 border border-amber-500/20' : sub.plan === 'enterprise' ? 'bg-purple-500/10 text-purple-400 border border-purple-500/20' : 'bg-slate-800 text-slate-400'}`}>
                                                                                    {(sub.plan || 'free').toUpperCase()}
                                                                                </span>
                                                                                {sub.status === 'pending' && sub.pendingPlan && (
                                                                                    <span className="inline-flex w-fit px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider bg-blue-500/20 text-blue-400 border border-blue-500/30 animate-pulse">
                                                                                        ➜ {sub.pendingPlan.toUpperCase()} ({sub.pendingMonths || 1}T)
                                                                                    </span>
                                                                                )}
                                                                            </div>
                                                                        </td>
                                                                        <td className="px-6 py-4">
                                                                            <span className={`inline-flex px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider ${sub.status === 'pending' ? 'bg-amber-500/15 text-amber-500 animate-pulse' : sub.status === 'expired' ? 'bg-rose-500/15 text-rose-500' : 'bg-emerald-500/15 text-emerald-400'}`}>
                                                                                {sub.status || 'active'}
                                                                            </span>
                                                                        </td>
                                                                        <td className="px-6 py-4 text-xs font-semibold">
                                                                            {exp ? (
                                                                                <div className="flex flex-col">
                                                                                    <span className="text-slate-300">{exp.toLocaleDateString('vi-VN')}</span>
                                                                                    {daysLeft !== null && (
                                                                                        <span className={`text-[9px] font-black uppercase tracking-wider mt-0.5 ${daysLeft <= 0 || sub.status === 'expired' ? 'text-rose-500' : daysLeft <= 7 ? 'text-amber-500' : 'text-emerald-500'}`}>
                                                                                            ({daysLeft <= 0 || sub.status === 'expired' ? 'Hết hạn' : `${daysLeft} ngày còn lại`})
                                                                                        </span>
                                                                                    )}
                                                                                </div>
                                                                            ) : (
                                                                                <span className="text-slate-500">—</span>
                                                                            )}
                                                                        </td>
                                                                        <td className="px-6 py-4 text-xs font-bold text-slate-300">{latest?.months ? latest.months + ' tháng' : '—'}</td>
                                                                        <td className="px-6 py-4 text-xs font-bold text-emerald-400">{latest?.amount ? latest.amount.toLocaleString('vi-VN') + 'đ' : '—'}</td>
                                                                        <td className="px-6 py-4 text-[10px] text-slate-500 font-mono">{latest?.date ? new Date(latest.date).toLocaleString('vi-VN') : '—'}</td>
                                                                        <td className="px-6 py-4 text-right">
                                                                            <div className="flex items-center justify-end gap-2">
                                                                                {sub.status === 'pending' && (
                                                                                    <>
                                                                                        <button onClick={() => handleApprove(u.id)} className="flex items-center gap-1 px-3 py-1.5 bg-emerald-500/15 hover:bg-emerald-500 text-emerald-400 hover:text-white rounded-xl text-xs font-bold transition-all shadow-sm">
                                                                                            <span className="material-symbols-outlined text-xs font-black">check</span> Duyệt
                                                                                        </button>
                                                                                        <button onClick={() => handleReject(u.id)} className="flex items-center gap-1 px-3 py-1.5 bg-rose-500/15 hover:bg-rose-500 text-rose-400 hover:text-white rounded-xl text-xs font-bold transition-all shadow-sm">
                                                                                            <span className="material-symbols-outlined text-xs font-black">close</span> Hủy
                                                                                        </button>
                                                                                    </>
                                                                                )}
                                                                                <button onClick={() => setEditModal({ userId: u.id, plan: sub.plan || 'free', months: latest?.months || 1, status: sub.status || 'active', role: u.role || 'user' })} className="flex items-center gap-1 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-xs font-bold transition-all border border-slate-700">
                                                                                    <span className="material-symbols-outlined text-xs">edit</span> Sửa
                                                                                </button>
                                                                            </div>
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Edit User Subscription Modal */}
                    {editModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-950/70 backdrop-blur-sm" onClick={() => setEditModal(null)}></div>
                            <div className="relative w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl overflow-hidden animate-slide-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-black text-white flex items-center gap-2">
                                        <span className="material-symbols-outlined text-primary">edit_note</span> Chỉnh sửa gói thành viên
                                    </h2>
                                    <button onClick={() => setEditModal(null)} className="p-1.5 hover:bg-slate-800 rounded-full transition-colors">
                                        <span className="material-symbols-outlined text-sm">close</span>
                                    </button>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Cấp độ gói</label>
                                        <select className="w-full bg-slate-950 border border-slate-850 rounded-xl px-4 py-3 text-sm text-slate-200 outline-none focus:border-primary transition-all cursor-pointer" value={editModal.plan} onChange={e => setEditModal({...editModal, plan: e.target.value})}>
                                            <option value="free">Free (Miễn phí)</option>
                                            <option value="pro">Pro - 199.000đ/tháng</option>
                                            <option value="enterprise">Enterprise - 499.000đ/tháng</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Số tháng gia hạn</label>
                                        <input type="number" min="1" max="36" className="w-full bg-slate-950 border border-slate-850 rounded-xl px-4 py-3 text-sm text-slate-200 outline-none focus:border-primary transition-all" value={editModal.months} onChange={e => setEditModal({...editModal, months: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Trạng thái kích hoạt</label>
                                        <select className="w-full bg-slate-950 border border-slate-850 rounded-xl px-4 py-3 text-sm text-slate-200 outline-none focus:border-primary transition-all cursor-pointer" value={editModal.status} onChange={e => setEditModal({...editModal, status: e.target.value})}>
                                            <option value="active">Hoạt động (Active)</option>
                                            <option value="pending">Đang đợi duyệt (Pending)</option>
                                            <option value="expired">Hết hạn sử dụng (Expired)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Phân quyền vai trò</label>
                                        <select className="w-full bg-slate-950 border border-slate-850 rounded-xl px-4 py-3 text-sm text-slate-200 outline-none focus:border-primary transition-all cursor-pointer" value={editModal.role || 'user'} onChange={e => setEditModal({...editModal, role: e.target.value})}>
                                            <option value="user">USER (Thành viên)</option>
                                            <option value="admin">ADMIN (Quản trị viên)</option>
                                        </select>
                                    </div>
                                </div>

                                <div className="flex gap-3 mt-6 pt-5 border-t border-slate-800/85">
                                    <button className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-350 font-bold rounded-xl text-xs transition-all" onClick={() => setEditModal(null)}>Hủy bỏ</button>
                                    <button className="flex-1 py-3 bg-primary hover:bg-opacity-90 text-slate-950 font-black rounded-xl text-xs shadow-lg transition-all" onClick={() => handleEditSave(editModal.userId, editModal.plan, editModal.months, editModal.status, editModal.role || 'user')}>Lưu thay đổi</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Sliding Dynamic Toast */}
                    {toast && (
                        <div className={`fixed bottom-6 right-6 z-50 px-5 py-3.5 rounded-2xl shadow-2xl flex items-center gap-3 transition-all duration-300 border animate-slide-in ${toast.type === 'error' ? 'bg-rose-500/10 border-rose-500/30 text-rose-400' : 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400'}`}>
                            <span className="material-symbols-outlined text-lg">
                                {toast.type === 'error' ? 'report' : 'verified'}
                            </span>
                            <span className="text-xs font-bold">{toast.msg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
